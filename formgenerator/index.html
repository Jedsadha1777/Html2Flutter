<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Generator</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f3f4f6; }

        /* Same styles as blade template */
        .form-field-btn { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background: #374151; color: white; border: none; border-radius: 6px; cursor: move; text-align: left; font-size: 14px; }
        .form-field-btn:hover { background: #4B5563; }
        .menu-section { margin-bottom: 20px; }
        .menu-title { color: #9CA3AF; font-size: 12px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .preview-content { overflow-x: auto !important; overflow-y: auto !important; max-width: 100% !important; }
        .preview-content table { display: table !important; width: 100% !important; }

        /* File upload section */
        .upload-section { margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .upload-section label { font-weight: 600; font-size: 14px; color: #374151; }
        .upload-section input[type="file"] { font-size: 14px; }

        /* Button styles matching blade */
        .btn { display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 8px; color: white; border: none; cursor: pointer; font-size: 14px; }
        .btn-gray { background-color: #4B5563; }
        .btn-gray:hover { background-color: #374151; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-export { background-color: #8b5cf6; display: none; }
        .btn-export:hover { background-color: #7c3aed; }
    </style>
</head>
<body>

<!-- File Upload -->
<div class="upload-section">
    <label>Upload Excel (.xlsx):</label>
    <input type="file" id="excel_file_input" accept=".xlsx,.xls">
</div>

<!-- Same HTML structure as TemplateDocumentResource.php blade output -->
<div id="wrapper_luckysheet_editor" wire:ignore>
    <div class="no-tailwind">
        <div id="luckysheet_editor" style="margin:10px 0;width:100%;height:600px;border:1px solid #ccc;position:relative;overflow:hidden;"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;align-items:center;flex-wrap:wrap;">
        <button type="button" id="fullscreen_btn_luckysheet_editor" class="btn btn-gray">Fullscreen</button>
        <button type="button" id="preview_btn_luckysheet_editor" class="btn btn-primary">Preview HTML</button>
        <button type="button" id="reload_btn_luckysheet_editor" style="display:none;" class="btn btn-primary">Reload Html</button>
        <button type="button" id="export_btn" class="btn btn-export" onclick="exportHTML()">Export HTML</button>
        <div id="status_luckysheet_editor" style="font-size:14px;color:#6b7280;">Upload an Excel file to start</div>
    </div>
    <div id="preview_luckysheet_editor" style="display:none;margin-top:24px;">
        <h3 style="font-size:18px;font-weight:600;margin-bottom:12px;">HTML Preview</h3>
        <div id="preview_sheets_luckysheet_editor"></div>
    </div>
</div>

<!-- Content output (replaces the Livewire textarea) -->
<textarea id="content_output" data-content-field="true" name="content" style="display:none;"></textarea>

<!-- Load the SAME scripts as the original system -->
<script src="js/luckysheet-editor.js"></script>

<script>
(function() {
    var fileInput = document.getElementById('excel_file_input');

    fileInput.addEventListener('change', function() {
        var file = this.files[0];
        if (!file) return;

        document.getElementById('status_luckysheet_editor').textContent = 'Loading: ' + file.name + '...';

        var reader = new FileReader();
        reader.onload = function(e) {
            var arrayBuffer = e.target.result;

            // Reset guard so re-upload works
            window.LuckysheetEditors['wrapper_luckysheet_editor'] = false;
            try { luckysheet.destroy(); } catch(ex) {}

            // Call the SAME initLuckysheetEditor from the original codebase
            initLuckysheetEditor('wrapper_luckysheet_editor', {
                containerId: 'luckysheet_editor',
                statusId: 'status_luckysheet_editor',
                fullscreenBtnId: 'fullscreen_btn_luckysheet_editor',
                previewBtnId: 'preview_btn_luckysheet_editor',
                reloadBtnId: 'reload_btn_luckysheet_editor',
                previewId: 'preview_luckysheet_editor',
                previewSheetsId: 'preview_sheets_luckysheet_editor',
                fileUrl: arrayBuffer  // ArrayBuffer instead of URL
            });
        };
        reader.readAsArrayBuffer(file);
    });

    // Export HTML - download generated content
    window.exportHTML = function() {
        var contentEl = document.getElementById('content_output');
        if (!contentEl || !contentEl.value) {
            alert('No content generated yet. Click "Preview HTML" first.');
            return;
        }

        try {
            var data = JSON.parse(contentEl.value);
            var sheets = data.sheets || [];

            var fullHtml = '<!DOCTYPE html>\n<html lang="th">\n<head>\n<meta charset="UTF-8">\n<title>Generated Form</title>\n<style>\n  body { font-family: Arial, sans-serif; padding: 20px; }\n  table { border-collapse: collapse; font-size: 11pt; }\n  .checkbox-group { display: inline-flex; flex-wrap: wrap; gap: 8px; align-items: center; }\n</style>\n</head>\n<body>\n';

            sheets.forEach(function(sheet) {
                fullHtml += '<div style="margin-bottom:40px;">\n<h2>' + sheet.name + '</h2>\n' + sheet.html + '\n</div>\n';
            });

            fullHtml += '</body>\n</html>';

            var blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'form-output.html';
            a.click();
            URL.revokeObjectURL(url);
        } catch(e) {
            alert('Error exporting: ' + e.message);
        }
    };

    // Show export button after preview is generated
    var observer = new MutationObserver(function() {
        var previewEl = document.getElementById('preview_luckysheet_editor');
        if (previewEl && previewEl.style.display !== 'none') {
            document.getElementById('export_btn').style.display = 'inline-flex';
        }
    });
    observer.observe(document.getElementById('preview_luckysheet_editor'), { attributes: true });
})();
</script>
</body>
</html>
