<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Invoice</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; color: #000000; background-color: #ffffff; margin: 20px; ">
    <div style="width:800px;">

    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="border-collapse: collapse; width: 100%;">
        <tr>
            <td align="right" style="font-size: 36pt; color: #832da2; text-align: right; font-weight: bold;">
                INVOICE
            </td>
        </tr>
    </table>

    <br>

    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="border-collapse: collapse; width: 100%;">
        <tr>
            <td width="50%">&nbsp;</td>
            <td width="50%">
                <table width="100%" border="0" cellspacing="0" cellpadding="5" style="border-collapse: collapse; width: 100%;">
                    <tr>
                        <td style="padding: 8px; font-size: 12pt; border-bottom: 1px solid #832da2;">
                            Electricity <span style="font-size: 9pt; font-style: italic;">(estimated reading)</span>
                        </td>
                        <td style="padding: 8px; font-size: 12pt; text-align: right; border-bottom: 1px solid #832da2;">{d.elec :formatC}</td>
                    </tr>
                    <tr>
                        <td style="padding: 8px; font-size: 12pt; border-bottom: 1px solid #832da2;">
                            VAT <span style="font-size: 9pt; font-style: italic;">(Value Added Tax)</span>
                        </td>
                        <td style="padding: 8px; font-size: 12pt; text-align: right; border-bottom: 1px solid #832da2;">{d.VAT :formatC}</td>
                    </tr>
                    <tr>
                        <td style="padding: 8px; font-size: 12pt; border-bottom: 1px solid #832da2;">
                            Payments already made
                        </td>
                        <td style="padding: 8px; font-size: 12pt; text-align: right; border-bottom: 1px solid #832da2;">{d.already_paid :formatC}</td>
                    </tr>
                    <tr>
                        <td style="padding: 8px; font-size: 12pt; border-bottom: 1px solid #832da2; color: #832da1; font-weight: bold; border-top: 1px solid #832da2;">
                            Total amount (including VAT)
                        </td>
                        <td style="padding: 8px; text-align: right; color: #832da1; font-weight: bold; font-size: 14pt; border-top: 1px solid #832da2; border-bottom: 1px solid #832da2;">
                            {d.total:formatC}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <br><br>

    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="border-collapse: collapse; width: 100%;">
        <tr>
            <td width="33%" style="padding: 10px; vertical-align: top;">
                <strong>{d.name}</strong><br>
                {d.cust_nb}
            </td>
            <td width="33%" style="padding: 10px; vertical-align: top;">
                <span style="color: #832da2; font-weight: bold;">GREEN ENERGY CORPORATION</span>
            </td>
            <td width="33%" style="padding: 10px; vertical-align: top;">
                <span style="color: #832da2; font-weight: bold;">To pay</span><br>
                <strong>{d.total:formatC}</strong>
            </td>
        </tr>
    </table>
    </div>

</body>
</html>
